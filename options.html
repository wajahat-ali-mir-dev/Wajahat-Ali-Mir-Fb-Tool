<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAM Data Extractor - Dashboard</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">
        <img src="icons/icon48.png" alt="Logo">
        <div>
          <h1>WAM Extractor Dashboard</h1>
          <p>Manage, search, and export your extracted leads.</p>
        </div>
      </div>
      <div class="actions">
        <button id="btn-export" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Export CSV
        </button>
        <button id="btn-clear" class="btn btn-danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          Clear All
        </button>
      </div>
    </div>

    <div class="card">
      <div class="table-controls">
        <input type="text" id="search-input" class="search-box" placeholder="Search names, emails, or bios...">
        <div style="color: var(--text-muted); font-size: 14px;">
          Total: <span id="record-count" style="color: white; font-weight: 600;">0</span> records
        </div>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>URL</th>
              <th>Instagram</th>
              <th>Bio</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <span id="toast-msg">Action successful!</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
